<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>wasmux app entry</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0f1116;
        color: #e9eef8;
        padding: 1.25rem;
      }
      .card {
        width: min(40rem, 100%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        padding: 1rem 1.1rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }
      p {
        margin: 0 0 0.75rem;
        line-height: 1.45;
        opacity: 0.92;
      }
      a {
        display: inline-block;
        padding: 0.55rem 0.75rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: inherit;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Open wasmux in browser tab</h1>
      <p>The installed app scope is intentionally narrow. Open the editor in a normal browser tab.</p>
      <a href="/wasmux/" target="_blank" rel="noopener noreferrer">Open wasmux</a>
    </main>
  </body>
</html>
